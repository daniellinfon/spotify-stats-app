server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Crítico para Single Page Applications (React Router):
    # Cualquier ruta que no sea un archivo estático, devuelve index.html
    # y deja que React Router maneje la navegación en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para la API del backend.
    # Ventaja: el frontend llama a /api/... (misma origin) y nginx
    # redirige al backend. Evita problemas de CORS en producción.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache para assets estáticos con hash en el nombre (Vite los genera así)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}